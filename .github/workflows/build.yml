# CI/CD 構成 (ippoan/rust-alc-api の方式を踏襲):
#
#   PR   = coverage (hub-core を cargo llvm-cov で 100% 回帰チェック)
#        + check (xtensa 向け cargo check — ファームウェアのコンパイル検証)
#   main = フルビルド + espflash イメージ生成 + GitHub Pages デプロイ
#        + 各キャッシュの warm (PR は main で warm されたキャッシュを restore する)
#
# キャッシュのスコープ: PR ブランチで作られたキャッシュは他ブランチから参照
# できないが、main で作られたキャッシュは全ブランチから参照できる (GitHub
# Actions の branch スコープ規則)。そのため save は main 側の job に寄せる。
#
# ビルドレシピ (ESP-IDF キャッシュ戦略含む) は ippoan/ble-medical-gateway の
# .github/workflows/build.yml を踏襲。
name: Build and Deploy Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

# PR は最新コミット優先で実行中 run をキャンセルする。main はキャンセルしない:
# 連続マージで実行中の main ビルドを中断するとキャッシュ (rust-cache 等) が
# 保存されず、次のビルドが差分を丸ごと再コンパイルして遅くなるため、
# 実行中の run は完走させる (待機中の run は同グループ内で最新のみ残る)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # cache key と install コマンドの二重管理を避けるため一箇所にまとめる
  ESPFLASH_VERSION: '4.5.0'

jobs:
  # ------------------------------------------------------------------
  # coverage: crates/hub-core (純粋ロジック) をホストでテストし、
  # coverage_100.toml 登録ファイルの 100% ラインカバレッジを強制する。
  # main push でも走らせて rust-cache を warm する (save-if は main のみ)
  # ------------------------------------------------------------------
  coverage:
    name: Coverage 100% (hub-core)
    runs-on: ubuntu-latest
    # rust-toolchain.toml (channel = "esp") を上書きしてホストの stable を使う
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry/target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4

      # --target 明示でホスト向けにビルド ([build].target = xtensa の上書き)。
      # -p alc-hub-core により esp-idf 依存の firmware クレートはビルドしない
      - name: Run cargo llvm-cov (hub-core)
        run: |
          cargo llvm-cov -p alc-hub-core \
            --target x86_64-unknown-linux-gnu \
            --summary-only | tee /tmp/llvm-cov-summary.txt

      - name: Coverage 100% regression check
        run: bash scripts/check_coverage_100.sh /tmp/llvm-cov-summary.txt

  # ------------------------------------------------------------------
  # check: クレートごとの並列ジョブ (rust-alc-api の per-crate shard と同方式)。
  # 各 leg は自分のクレートを xtensa 向けに codegen 付きでビルドする
  # (metadata-only の cargo check は sccache の対象外のため build を使う。
  #  依存クレートのコンパイルは sccache ヒットで実質スキップされる)。
  # bin (main 配線のみ) はリンクを避けて check に留める。
  # main で warm された build キャッシュを restore 専用で使う
  # ------------------------------------------------------------------
  check:
    name: "Check (${{ matrix.name }})"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: core,    cmd: "cargo build --release --locked -p alc-hub-core" }
          - { name: common,  cmd: "cargo build --release --locked -p alc-hub-common" }
          - { name: board,   cmd: "cargo build --release --locked -p alc-hub-board" }
          - { name: ble,     cmd: "cargo build --release --locked -p alc-hub-ble" }
          - { name: wifi,    cmd: "cargo build --release --locked -p alc-hub-wifi" }
          - { name: drivers, cmd: "cargo build --release --locked -p alc-hub-drivers" }
          - { name: ui,      cmd: "cargo build --release --locked -p alc-hub-ui" }
          - { name: bin,     cmd: "cargo check --release --locked -p alc-hub-cores3" }
          # atoms3-print は sdkconfig が別 (W5500 有効/PSRAM・BLE 無し) のため
          # esp-idf-sys の設定元を ESP_IDF_SYS_ROOT_CRATE で本 crate に向ける。
          # sccache/rust-cache は cores3 系と esp-idf-sys ビルドを共有できない
          # (sdkconfig が違う) が、leg が独立 job なので互いを汚さない
          - { name: atoms3-print,
              cmd: "ESP_IDF_SYS_ROOT_CRATE=alc-hub-atoms3-print cargo check --release --locked -p alc-hub-atoms3-print" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # restore-mtime が履歴からファイル時刻を復元するため

      # 再コンパイルの根本原因対策: checkout はファイル mtime を現在時刻にする
      # ため、Cargo のフィンガープリントが毎回無効になり、変更が無くても
      # ワークスペース内クレートが再コンパイルされていた (sccache ヒットでも
      # 1 コンパイルごとに GHA キャッシュへのネットワーク往復が残る)。
      # コミット履歴から mtime を復元すると、未変更ファイルは前回 run と同じ
      # 時刻になり、Cargo が「ビルド済み」と判定してコンパイル自体を省略する。
      # rust-cache の cache-workspace-crates: true (自作クレート成果物も保存)
      # とセットで機能する
      - name: Restore file mtimes (cargo fingerprint 安定化)
        uses: chetan/git-restore-mtime-action@v2

      # main で保存されたキャッシュを restore (key 完全一致なら再保存も無い)
      - name: Cache ESP-IDF tools/checkout
        uses: actions/cache@v4
        with:
          path: .embuild
          key: esp-idf-tools-${{ runner.os }}-${{ hashFiles('.cargo/config.toml') }}
          restore-keys: |
            esp-idf-tools-${{ runner.os }}-

      # esp ツールチェーン (数百MB) のダウンロードを毎回やらない。
      # 新しい Rust ESP リリースに上げたい時は key の -v1 を上げて invalidate
      - name: Cache Xtensa Rust toolchain
        id: cache-xtensa
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/esp
            ~/.cargo/bin/ldproxy
          key: xtensa-rust-${{ runner.os }}-v1

      - name: Install Xtensa Rust toolchain
        if: steps.cache-xtensa.outputs.cache-hit != 'true'
        uses: esp-rs/xtensa-toolchain@v1.7.0
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      # cache hit で Install step をスキップすると、action が設定するはずの
      # LIBCLANG_PATH が無く、esp-idf-sys の bindgen がシステム libclang
      # (xtensa 非対応) を使って "unknown target triple 'xtensa'" で落ちる
      # (PR #5-#7 で実測)。キャッシュ済みツールチェーン内の xtensa 対応
      # libclang を探して設定する
      - name: Export LIBCLANG_PATH (cache hit)
        if: steps.cache-xtensa.outputs.cache-hit == 'true'
        run: |
          LIBCLANG_FILE=$(find "$HOME/.rustup/toolchains/esp" -name 'libclang.so*' -type f 2>/dev/null | head -1)
          if [ -z "$LIBCLANG_FILE" ]; then
            echo "::error::キャッシュ済み esp ツールチェーンに libclang が見つかりません。cache key (-v1) を上げて再インストールしてください"
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "$LIBCLANG_FILE")" >> "$GITHUB_ENV"

      - name: Cache cargo registry/target (restore only)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build
          key: ${{ hashFiles('.cargo/config.toml') }}
          save-if: 'false'
          # 自作クレートの成果物も復元する (restore-mtime とセットで
          # 「未変更クレートはコンパイル自体をスキップ」を成立させる)
          cache-workspace-crates: 'true'

      # ワークスペース内クレートは checkout で mtime が変わるため、変更が
      # 無くても毎回再コンパイルされる (docs のみのマージでも Build 142s を
      # 実測。rust-cache も自作クレートの成果物は保存しない)。sccache は
      # 内容ベースの rustc キャッシュなので、この再コンパイルをヒットに変える
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Check (${{ matrix.name }})
        env:
          SCCACHE_GHA_ENABLED: 'true'
          RUSTC_WRAPPER: sccache
        run: |
          ${{ matrix.cmd }}
          sccache --show-stats

  # ------------------------------------------------------------------
  # build: フルビルド + 書き込みイメージ (main のみ)。
  # cores3 (CoreS3 統合ハブ) と atoms3-print (AtomS3 印刷ブリッジ) の
  # 2 バイナリを並行ビルドする。sdkconfig が異なるため esp-idf-sys の
  # ビルドは共有できず、rust-cache は leg ごとに分離する (cache_key)。
  # Pages サイト組み立ては assemble-pages job (後述) に分離
  # ------------------------------------------------------------------
  build:
    name: "Build firmware (${{ matrix.name }})"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # cores3 は従来と同じ cache_key (build) で warm 済みキャッシュを継続利用
          - name: cores3
            bin: alc-hub-cores3
            build_env: ''
            flash_size: 16mb
            partition_table: partitions.csv
            cache_key: build
          - name: atoms3-print
            bin: alc-hub-atoms3-print
            build_env: 'ESP_IDF_SYS_ROOT_CRATE=alc-hub-atoms3-print'
            flash_size: 8mb
            partition_table: crates/atoms3-print/partitions.csv
            cache_key: build-atoms3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # restore-mtime が履歴からファイル時刻を復元するため

      # 再コンパイルの根本原因対策: checkout はファイル mtime を現在時刻にする
      # ため、Cargo のフィンガープリントが毎回無効になり、変更が無くても
      # ワークスペース内クレートが再コンパイルされていた (sccache ヒットでも
      # 1 コンパイルごとに GHA キャッシュへのネットワーク往復が残る)。
      # コミット履歴から mtime を復元すると、未変更ファイルは前回 run と同じ
      # 時刻になり、Cargo が「ビルド済み」と判定してコンパイル自体を省略する。
      # rust-cache の cache-workspace-crates: true (自作クレート成果物も保存)
      # とセットで機能する
      - name: Restore file mtimes (cargo fingerprint 安定化)
        uses: chetan/git-restore-mtime-action@v2

      # ESP-IDF 本体 (git clone) + xtensa-esp32s3-elf-gcc/cmake/ninja 等のツール一式。
      # .cargo/config.toml の ESP_IDF_VERSION が変わらない限り毎回同じものなので
      # キャッシュが効く。main への push ごとに warm され続ける
      - name: Cache ESP-IDF tools/checkout
        uses: actions/cache@v4
        with:
          path: .embuild
          key: esp-idf-tools-${{ runner.os }}-${{ hashFiles('.cargo/config.toml') }}
          restore-keys: |
            esp-idf-tools-${{ runner.os }}-

      # esp ツールチェーン (数百MB) のダウンロードを毎回やらない。
      # 新しい Rust ESP リリースに上げたい時は key の -v1 を上げて invalidate
      - name: Cache Xtensa Rust toolchain
        id: cache-xtensa
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/esp
            ~/.cargo/bin/ldproxy
          key: xtensa-rust-${{ runner.os }}-v1

      - name: Install Xtensa Rust toolchain
        if: steps.cache-xtensa.outputs.cache-hit != 'true'
        uses: esp-rs/xtensa-toolchain@v1.7.0
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      # cache hit で Install step をスキップすると、action が設定するはずの
      # LIBCLANG_PATH が無く、esp-idf-sys の bindgen がシステム libclang
      # (xtensa 非対応) を使って "unknown target triple 'xtensa'" で落ちる
      # (PR #5-#7 で実測)。キャッシュ済みツールチェーン内の xtensa 対応
      # libclang を探して設定する
      - name: Export LIBCLANG_PATH (cache hit)
        if: steps.cache-xtensa.outputs.cache-hit == 'true'
        run: |
          LIBCLANG_FILE=$(find "$HOME/.rustup/toolchains/esp" -name 'libclang.so*' -type f 2>/dev/null | head -1)
          if [ -z "$LIBCLANG_FILE" ]; then
            echo "::error::キャッシュ済み esp ツールチェーンに libclang が見つかりません。cache key (-v1) を上げて再インストールしてください"
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "$LIBCLANG_FILE")" >> "$GITHUB_ENV"

      # key に ESP_IDF_VERSION (.cargo/config.toml) のハッシュを明示的に足す:
      # esp-idf-sys の CMake ビルドディレクトリは ninja 等の絶対パスを記憶するため、
      # ESP_IDF_VERSION 変更時に古いキャッシュを prefix fallback で復元すると
      # CMake configure が壊れる (ble-medical-gateway で実測)
      - name: Cache cargo registry/target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          key: ${{ hashFiles('.cargo/config.toml') }}
          cache-on-failure: true
          # 自作クレートの成果物も保存する (restore-mtime とセットで
          # 「未変更クレートはコンパイル自体をスキップ」を成立させる)
          cache-workspace-crates: 'true'

      - name: Cache espflash binary
        id: cache-espflash
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/espflash
          key: espflash-${{ env.ESPFLASH_VERSION }}-${{ runner.os }}

      - name: Install espflash
        if: steps.cache-espflash.outputs.cache-hit != 'true'
        run: cargo install espflash --version "$ESPFLASH_VERSION" --locked

      # バージョン切替初回に古い restore-key が刺さる問題の根本対策:
      # 絶対パスを記憶する esp-idf-sys の CMake 中間生成物だけを毎回消し、
      # CMake configure を素の状態からやり直させる
      - name: Clear stale esp-idf-sys CMake build dir
        run: rm -rf target/xtensa-esp32s3-espidf/*/build/esp-idf-sys-*/out/build

      # ワークスペース内クレートの mtime 起因の再コンパイルを内容ベースの
      # rustc キャッシュでヒットに変える (check job のコメント参照)
      - uses: mozilla-actions/sccache-action@v0.0.9

      # build_env (atoms3-print の ESP_IDF_SYS_ROOT_CRATE) は run の env に
      # 直接書けない (空文字 leg があるため) ので、コマンド行頭に前置する
      - name: Build
        env:
          SCCACHE_GHA_ENABLED: 'true'
          RUSTC_WRAPPER: sccache
        run: |
          env ${{ matrix.build_env }} cargo build --release --locked -p ${{ matrix.bin }}
          sccache --show-stats

      - name: Save merged flashable image
        run: |
          espflash save-image --chip esp32s3 --merge \
            --flash-size ${{ matrix.flash_size }} \
            --partition-table ${{ matrix.partition_table }} \
            target/xtensa-esp32s3-espidf/release/${{ matrix.bin }} \
            ${{ matrix.bin }}-merged.bin

      # OTA (`OTA <url>` / WS 下り {"action":"ota"}) 用の app 単体イメージ。
      # merged と違い bootloader/partition table を含まない (ota.rs 参照)
      - name: Save OTA app image
        run: |
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/${{ matrix.bin }} \
            ${{ matrix.bin }}-app.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: |
            ${{ matrix.bin }}-merged.bin
            ${{ matrix.bin }}-app.bin
          if-no-files-found: error

  # ------------------------------------------------------------------
  # assemble-pages: 各 build leg の成果物を集めて Pages サイトを組む。
  # 現状の公開内容は CoreS3 のみ (従来と同一)。atoms3-print の
  # インストーラーページ/manifest は後続 PR で追加する (issue #38)
  # ------------------------------------------------------------------
  assemble-pages:
    name: Assemble Pages site
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          merge-multiple: true

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version *= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Assemble Pages site
        run: |
          mkdir -p _site/firmware
          cp docs/index.html _site/
          cp alc-hub-cores3-merged.bin _site/firmware/
          cp alc-hub-cores3-app.bin _site/firmware/
          # atoms3-print はオンラインアップデート (OTA <url>) 用に bin だけ公開。
          # ESP Web Tools のインストーラーページ/manifest は後続 PR (issue #38)
          cp alc-hub-atoms3-print-merged.bin _site/firmware/
          cp alc-hub-atoms3-print-app.bin _site/firmware/
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed "s/\"version\": \"[^\"]*\"/\"version\": \"${{ steps.version.outputs.version }}+$SHORT_SHA\"/" \
            docs/manifest.json > _site/manifest.json
          cat _site/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: assemble-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  auto-merge:
    name: Auto Merge
    needs: [coverage, check]
    if: github.event_name == 'pull_request'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    with:
      # "deploy" job は push:main のみで走り、PR run (auto-merge) と同時に
      # 走ることが無いため gate 対象から除外する (ble-medical-gateway と
      # 同じ判断。走行中 deploy が merge で無音 cancel される事故
      # ippoan/rust-alc-api#405 の対象パターンとは異なる)
      deploy_gate_ignore: 'deploy'
    secrets: inherit
